name: Daily Content Generation

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: content-engine/package.json
      - name: Install dependencies
        working-directory: content-engine
        run: npm install
      - name: Configure git
        run: |
          git config user.name "Jetztbuchbar Bot"
          git config user.email "bot@jetztbuchbar.de"
      - name: Run content engine
        working-directory: content-engine
        env:
          RUN_ONCE: '1'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          OPENTRIPMAP_KEY: ${{ secrets.OPENTRIPMAP_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node server.js
