<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Hotel Details – JetztBuchbar</title>
  <meta name="description" id="page-desc" content="" />
  <link rel="canonical" id="page-canonical" href="https://www.jetztbuchbar.de/hotel.html" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --bg-card: #121212; --bg-card2: #161616;
      --accent: #00c896; --accent-dark: #00a87e;
      --text: #f0f0f0; --text-muted: #888; --text-dim: #555;
      --border: #1e1e1e; --radius: 12px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      line-height: 1.6; -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 300;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1.25rem, 5vw, 3rem); height: 64px;
      background: rgba(10,10,10,0.92); backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.5px; color: var(--accent); }
    nav { display: flex; gap: 2rem; }
    nav a { font-size: 0.9rem; font-weight: 500; color: var(--text-muted); transition: color 0.2s; }
    nav a:hover { color: var(--accent); }

    /* ── LOADING ── */
    #hd-loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; font-size: 1.1rem; color: var(--text-muted);
    }

    /* ── HERO GALLERY ── */
    .hd-gallery {
      position: relative; width: 100%;
      background: #000; overflow: hidden;
      aspect-ratio: 16 / 6;
    }
    @media (max-width: 640px) { .hd-gallery { aspect-ratio: 4 / 3; } }

    .hd-gallery-track {
      display: flex; height: 100%;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
    }
    .hd-gallery-track img {
      flex: 0 0 100%; width: 100%; height: 100%;
      object-fit: cover; user-select: none; pointer-events: none;
    }
    .hd-gb {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(6px); color: #fff;
      font-size: 1.8rem; line-height: 1;
      width: 44px; height: 44px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 10;
    }
    .hd-gb:hover { background: rgba(0,200,150,0.6); }
    .hd-gb.prev { left: 1rem; }
    .hd-gb.next { right: 1rem; }

    .hd-gallery-counter {
      position: absolute; bottom: 1rem; right: 1rem;
      background: rgba(0,0,0,0.65); color: #fff; font-size: 0.8rem;
      font-weight: 600; padding: 0.25rem 0.7rem; border-radius: 20px;
      backdrop-filter: blur(4px); z-index: 10; letter-spacing: 0.03em;
    }
    .hd-gallery-dots {
      position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px; z-index: 10;
    }
    .hd-gallery-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.3); cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .hd-gallery-dots span.active { background: var(--accent); transform: scale(1.3); }

    /* ── TWO-COLUMN WRAPPER ── */
    .hd-wrapper {
      max-width: 1220px; margin: 0 auto;
      padding: clamp(1.5rem, 3vw, 2.5rem) clamp(1rem, 3vw, 2rem);
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 2rem;
      align-items: start;
    }
    @media (max-width: 900px) {
      .hd-wrapper { grid-template-columns: 1fr; }
      .hd-sidebar { order: -1; }
    }

    /* ── MAIN ── */
    .hd-back {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--text-muted); font-size: 0.85rem;
      margin-bottom: 1.5rem; transition: color 0.2s;
    }
    .hd-back:hover { color: var(--accent); }

    .hd-hotel-header { margin-bottom: 2rem; }
    .hd-name { font-size: clamp(1.6rem, 4vw, 2.3rem); font-weight: 800; line-height: 1.2; margin-bottom: 0.4rem; }
    .hd-stars { color: #f5a623; font-size: 1.3rem; margin-bottom: 0.35rem; }
    .hd-location { color: var(--text-muted); font-size: 0.95rem; }

    .hd-section { margin-bottom: 2.75rem; }
    .hd-section-title {
      font-size: 1.1rem; font-weight: 700; color: var(--accent);
      padding-bottom: 0.6rem; margin-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── MAP ── */
    #hd-map {
      height: 360px; border-radius: var(--radius);
      overflow: hidden; border: 1px solid var(--border);
    }

    /* ── AUSSTATTUNG – kategorisiert ── */
    .hd-fac-cat { margin-bottom: 1.25rem; }
    .hd-fac-cat-title {
      font-size: 0.88rem; font-weight: 700; color: var(--text-muted);
      margin-bottom: 0.6rem; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .hd-fac-items { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .hd-fac-badge {
      display: inline-flex; align-items: center;
      background: rgba(0,200,150,0.07);
      border: 1px solid rgba(0,200,150,0.25);
      color: var(--text); font-size: 0.8rem;
      padding: 0.25rem 0.7rem; border-radius: 20px;
    }

    /* ── ÜBER DAS HOTEL ── */
    .hd-desc-section { margin-bottom: 1.4rem; }
    .hd-desc-section h3 {
      font-size: 1rem; font-weight: 700; color: var(--text);
      margin-bottom: 0.45rem; padding-left: 0.7rem;
      border-left: 3px solid var(--accent);
    }
    .hd-desc-section p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.75; }

    /* ── ZIMMERTYPEN ── */
    .hd-room-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 0.85rem;
    }
    .hd-room-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.1rem;
      display: flex; flex-direction: column; gap: 0.6rem;
      transition: border-color 0.2s;
    }
    .hd-room-card:hover { border-color: rgba(0,200,150,0.35); }
    .hd-room-name { font-weight: 700; font-size: 0.9rem; line-height: 1.3; }
    .hd-room-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .hd-room-tag {
      background: rgba(255,255,255,0.06); color: var(--text-muted);
      font-size: 0.72rem; padding: 0.15rem 0.5rem; border-radius: 4px;
    }
    .hd-room-anfragen {
      margin-top: auto;
      background: none; border: 1px solid var(--accent);
      color: var(--accent); border-radius: 6px;
      font-size: 0.78rem; font-weight: 700; padding: 0.38rem 0.6rem;
      cursor: pointer; transition: background 0.2s;
      align-self: flex-start;
    }
    .hd-room-anfragen:hover { background: rgba(0,200,150,0.12); }

    /* ── STICKY SIDEBAR ── */
    .hd-sidebar { position: sticky; top: 80px; }

    .hd-sidebar-card {
      background: var(--bg-card2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.4rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .hd-sb-name { font-size: 1.05rem; font-weight: 800; line-height: 1.3; }
    .hd-sb-stars { color: #f5a623; font-size: 1.1rem; }
    .hd-sb-location { color: var(--text-muted); font-size: 0.82rem; margin-bottom: 0.25rem; }
    .hd-sb-divider { border: none; border-top: 1px solid var(--border); margin: 0.25rem 0; }
    .hd-sb-meta { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.25rem; }
    .hd-sb-meta-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.82rem;
    }
    .hd-sb-meta-row .lbl { color: var(--text-muted); }
    .hd-sb-meta-row .val { font-weight: 600; color: var(--text); }

    .hd-anfragen-btn {
      width: 100%; padding: 0.85rem;
      background: var(--accent); color: #000;
      border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 800;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
      margin-top: 0.5rem;
    }
    .hd-anfragen-btn:hover { background: var(--accent-dark); transform: translateY(-1px); }
    .hd-sb-hint { text-align: center; font-size: 0.73rem; color: var(--text-dim); }

    /* ── ANFRAGEN BUBBLE ── */
    .hd-ab {
      position: fixed; bottom: 90px; right: 22px; width: 285px;
      background: #161616; border: 1px solid var(--accent);
      border-radius: 12px; padding: 0.85rem 1rem;
      z-index: 99999; box-shadow: 0 8px 32px rgba(0,0,0,0.65);
      font-size: 0.78rem; display: none;
    }
    .hd-ab-head {
      display: flex; justify-content: space-between; align-items: center;
      font-weight: 700; color: var(--accent); margin-bottom: 0.5rem; font-size: 0.82rem;
    }
    .hd-ab-x {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 1rem; padding: 0; line-height: 1;
    }
    .hd-ab-hotel { color: var(--text); font-size: 0.82rem; margin-bottom: 0.45rem; }
    .hd-ab-msg {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.45rem 0.6rem;
      color: var(--text-muted); font-size: 0.74rem; line-height: 1.45;
      margin-bottom: 0.5rem; word-break: break-word;
    }
    .hd-ab-hint {
      color: var(--accent); font-size: 0.76rem; font-weight: 700;
      text-align: center; border-top: 1px solid var(--border); padding-top: 0.45rem;
    }
    .hd-ab-hint kbd {
      background: rgba(0,200,150,0.15); border: 1px solid var(--accent);
      border-radius: 3px; padding: 0.05rem 0.3rem; font-family: monospace;
    }
  </style>

<body>

  <header>
    <div style="display:flex;align-items:center;gap:12px;flex-shrink:0;"><a href="/" class="logo">JetztBuchbar</a><span style="display:flex;align-items:center;gap:6px;flex-shrink:0;"><span style="border-left:1px solid rgba(255,255,255,.15);height:16px;margin:0 4px;display:inline-block;"></span><span style="width:7px;height:7px;border-radius:50%;background:#00c896;flex-shrink:0;animation:jb-pulse 2s ease-in-out infinite;"></span><span style="font-size:13px;font-weight:500;color:rgba(255,255,255,.7);white-space:nowrap;">Verifizierte Hoteldaten</span></span></div>
    <nav>
      <a href="/ueber-uns.html">Über uns</a>

  <div id="hd-loading">⏳ Lade Hotel…</div>

  <div id="hd-root" style="display:none">

    <!-- Hero-Galerie -->
    <div class="hd-gallery" id="hd-gallery">
      <div class="hd-gallery-track" id="hd-track"></div>
      <button class="hd-gb prev" id="hd-prev" aria-label="Zurück">&#8249;</button>
      <button class="hd-gb next" id="hd-next" aria-label="Weiter">&#8250;</button>
      <div class="hd-gallery-dots" id="hd-dots"></div>

    </div>

    <!-- Hauptlayout: Content + Sidebar -->
    <div class="hd-wrapper">

      <main class="hd-main">
        <a href="/" class="hd-back">&#8592; Zurück zur Übersicht</a>

        <div class="hd-hotel-header">
          <h1 class="hd-name" id="hd-name"></h1>
          <div class="hd-stars" id="hd-stars"></div>

        </div>

        <!-- Karte -->
        <section class="hd-section" id="hd-map-section" style="display:none">
          <div class="hd-section-title">📍 Lage</div>

        <!-- Ausstattung (kategorisiert) -->
        <section class="hd-section" id="hd-fac-section" style="display:none">

        <!-- Über das Hotel -->

        <!-- Zimmertypen -->
        <section class="hd-section" id="hd-rooms-section" style="display:none">

      <!-- Sticky Sidebar -->
      <aside class="hd-sidebar">

      </aside>

    </div>
  </div><!-- /hd-root -->

  <script>
  (function () {
    'use strict';

    // ── Fact-Labels für kategorisierte Ausstattung ──────────────────
    var FAC_LABELS = {
      89:'Strand', 336:'Strandbar', 439:'Strandkorb', 301:'Meeresnähe',
      50:'Außenpool', 58:'Pool', 43:'Hallenbad', 697:'Infinity-Pool',
      696:'Rooftop-Pool', 86:'Wasserrutsche', 588:'Wasserpark', 698:'Swim-up Bar', 59:'Poolbar',
      197:'Spa', 479:'Wellness-Center', 195:'Massage', 196:'Sauna',
      192:'Hamam', 198:'Dampfbad', 660:'Sauna', 201:'Whirlpool',
      94:'All Inclusive Plus', 92:'All Inclusive', 101:'Vollpension', 103:'Halbpension',
      65:'Restaurant', 299:'Restaurant', 14:'Bar', 288:'Bar/Pub',
      450:'Lobbybar', 575:'Bar/Lounge', 20:'Café', 73:'Snackbar',
      945:'Kids Club', 946:'Teens Club', 1:'Kinderbetreuung', 7:'Miniclub',
      707:'Kinder kostenlos', 4:'Kinderprogramm', 26:'Kinderpool', 56:'Spielplatz', 57:'Spielzimmer',
      220:'Fitness-Studio', 219:'Golf', 236:'Tauchen', 593:'Tennisplatz',
      209:'Beach-Volleyball', 240:'Schnorcheln', 247:'Wasserski', 249:'Windsurfen',
      245:'Tennis', 244:'Tischtennis', 250:'Yoga', 211:'Billard',
      2:'Animationsprogramm', 3:'Abendunterhaltung', 31:'Disco', 49:'Nachtclub',
      24:'Casino', 5:'Live-Musik', 6:'Mini-Disco',
      66:'Zimmerservice', 71:'Shuttleservice', 81:'Transferservice', 567:'Concierge',
      88:'WLAN', 185:'WLAN', 568:'Einparkservice', 22:'Parkplatz',
      90:'Zentrale Lage', 91:'Ruhige Lage', 291:'Stadtzentrum',
      393:'Für Flitterwochen', 385:'Adults Only', 389:'Familienfreundlich', 781:'Für Paare',
      401:'Konferenzeinrichtungen'
    };

    var FAC_CATS = [
      { icon: '🏖️', label: 'Strand & Meer',            ids: [89, 336, 439, 301] },
      { icon: '🏊', label: 'Pool & Wasserpark',          ids: [50, 58, 43, 697, 696, 86, 588, 698, 59] },
      { icon: '💆', label: 'Spa & Wellness',             ids: [197, 479, 195, 196, 192, 198, 660, 201] },
      { icon: '🍽️', label: 'Verpflegung & Gastronomie', ids: [94, 92, 101, 103, 65, 299, 14, 288, 450, 575, 20, 73] },
      { icon: '👨‍👩‍👧', label: 'Kinder & Familie',       ids: [945, 946, 1, 7, 707, 4, 26, 56, 57] },
      { icon: '🏋️', label: 'Sport & Aktivitäten',       ids: [220, 219, 236, 593, 209, 240, 247, 249, 245, 244, 250, 211] },
      { icon: '🎭', label: 'Unterhaltung',               ids: [2, 3, 31, 49, 24, 5, 6] },
      { icon: '🛎️', label: 'Service & Komfort',          ids: [66, 71, 81, 567, 88, 185, 568, 22, 90, 91] },
      { icon: '🎯', label: 'Zielgruppe',                 ids: [393, 385, 389, 781, 401, 291] }
    ];

    // ── Galerie ─────────────────────────────────────────────────────
    var galleryImages = [], currentIdx = 0, autoTimer = null;
    var MAX_DOTS = 14;

    function buildGallery(images, hotelName) {
      galleryImages = images;
      var track = document.getElementById('hd-track');
      var dotsEl = document.getElementById('hd-dots');
      var altBase = hotelName || 'Hotel';

      images.forEach(function (src, i) {
        var img = document.createElement('img');
        img.src = src; img.alt = altBase + ' – Foto ' + (i + 1);
        img.loading = i === 0 ? 'eager' : 'lazy';
        track.appendChild(img);
      });

      // Dots nur bei ≤ MAX_DOTS Bildern
      if (images.length <= MAX_DOTS) {
        images.forEach(function (_, i) {
          var dot = document.createElement('span');
          dot.dataset.i = i;
          dot.addEventListener('click', function () { goTo(+this.dataset.i); clearAuto(); startAuto(); });
          dotsEl.appendChild(dot);
        });
      }

      goTo(0);
      startAuto();
      document.getElementById('hd-prev').addEventListener('click', function () { slide(-1); });
      document.getElementById('hd-next').addEventListener('click', function () { slide(+1); });

      // Swipe support
      var touchX = null;
      track.addEventListener('touchstart', function (e) { touchX = e.changedTouches[0].clientX; }, { passive: true });
      track.addEventListener('touchend', function (e) {
        if (touchX === null) return;
        var dx = e.changedTouches[0].clientX - touchX;
        if (Math.abs(dx) > 40) slide(dx < 0 ? 1 : -1);
        touchX = null;
      }, { passive: true });
    }

    function goTo(i) {
      currentIdx = (i + galleryImages.length) % galleryImages.length;
      document.getElementById('hd-track').style.transform = 'translateX(-' + (currentIdx * 100) + '%)';
      document.getElementById('hd-counter').textContent = (currentIdx + 1) + ' / ' + galleryImages.length;
      document.querySelectorAll('#hd-dots span').forEach(function (d, j) {
        d.classList.toggle('active', j === currentIdx);
      });
    }
    function slide(d) { clearAuto(); goTo(currentIdx + d); startAuto(); }
    function startAuto() {
      clearAuto();
      if (galleryImages.length > 1) autoTimer = setInterval(function () { goTo(currentIdx + 1); }, 5000);
    }
    function clearAuto() { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; } }

    // ── Leaflet ──────────────────────────────────────────────────────
    function buildMap(lat, lng, name) {
      document.getElementById('hd-map-section').style.display = '';
      var map = L.map('hd-map', { scrollWheelZoom: false }).setView([lat, lng], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 18
      }).addTo(map);
      L.marker([lat, lng]).addTo(map).bindPopup(name).openPopup();
      return map;
    }

    // ── Ausstattung (kategorisiert) ──────────────────────────────────
    function buildFacilities(factIds, facilities) {
      var idSet = {};
      (factIds || []).forEach(function (id) { idSet[id] = true; });

      var body = document.getElementById('hd-fac-body');
      var hasAny = false;

      FAC_CATS.forEach(function (cat) {
        var seen = {};
        var badges = [];
        cat.ids.forEach(function (id) {
          var lbl = FAC_LABELS[id];
          if (lbl && idSet[id] && !seen[lbl]) { seen[lbl] = true; badges.push(lbl); }
        });
        if (!badges.length) return;
        hasAny = true;

        var wrap = document.createElement('div');
        wrap.className = 'hd-fac-cat';
        var title = document.createElement('div');
        title.className = 'hd-fac-cat-title';
        title.textContent = cat.icon + '  ' + cat.label;
        wrap.appendChild(title);

        var items = document.createElement('div');
        items.className = 'hd-fac-items';
        badges.forEach(function (lbl) {
          var b = document.createElement('span');
          b.className = 'hd-fac-badge'; b.textContent = lbl;
          items.appendChild(b);
        });
        wrap.appendChild(items);
        body.appendChild(wrap);
      });

      if (hasAny) document.getElementById('hd-fac-section').style.display = '';
    }

    // ── Beschreibung ─────────────────────────────────────────────────
    function buildDesc(sections) {
      if (!sections || !sections.length) return;
      var body = document.getElementById('hd-desc-body');
      sections.forEach(function (s) {
        var wrap = document.createElement('div');
        wrap.className = 'hd-desc-section';
        if (s.title) {
          var h3 = document.createElement('h3');
          h3.textContent = s.title; wrap.appendChild(h3);
        }
        var p = document.createElement('p');
        p.textContent = s.text; wrap.appendChild(p);
        body.appendChild(wrap);
      });
      document.getElementById('hd-desc-section').style.display = '';
    }

    // ── Zimmertypen ──────────────────────────────────────────────────
    function buildRooms(rooms, hotelName) {
      if (!rooms || !rooms.length) return;
      var grid = document.getElementById('hd-room-grid');
      rooms.forEach(function (r) {
        if (!r.name) return;
        var card = document.createElement('div');
        card.className = 'hd-room-card';

        var name = document.createElement('div');
        name.className = 'hd-room-name'; name.textContent = r.name;
        card.appendChild(name);

        if (r.category || r.type || r.view) {
          var tags = document.createElement('div');
          tags.className = 'hd-room-tags';
          [r.category, r.type, r.view].forEach(function (t) {
            if (!t) return;
            var sp = document.createElement('span');
            sp.className = 'hd-room-tag'; sp.textContent = t;
            tags.appendChild(sp);
          });
          card.appendChild(tags);
        }

        var btn = document.createElement('button');
        btn.className = 'hd-room-anfragen';
        btn.textContent = 'Anfragen';
        btn.addEventListener('click', function () { hdAnfragen(hotelName, r.name); });
        card.appendChild(btn);
        grid.appendChild(card);
      });
      document.getElementById('hd-rooms-section').style.display = '';
    }

    // ── Sidebar befüllen ─────────────────────────────────────────────
    function buildSidebar(h) {
      document.getElementById('hd-sb-name').textContent = h.name || '';
      var starsStr = h.stars ? '★'.repeat(h.stars) + '☆'.repeat(Math.max(0, 5 - h.stars)) : '';
      document.getElementById('hd-sb-stars').textContent = starsStr;
      var loc = [h.city, h.country].filter(Boolean).join(', ');
      document.getElementById('hd-sb-location').textContent = loc ? '📍 ' + loc : '';

      var meta = document.getElementById('hd-sb-meta');
      var fac = h.facilities || {};
      if (fac.concept) {
        var row1 = document.createElement('div');
        row1.className = 'hd-sb-meta-row';
        row1.innerHTML = '<span class="lbl">Verpflegung</span><span class="val">' + esc(fac.concept) + '</span>';
        meta.appendChild(row1);
      }
      if (fac.rooms) {
        var row2 = document.createElement('div');
        row2.className = 'hd-sb-meta-row';
        row2.innerHTML = '<span class="lbl">Zimmer</span><span class="val">' + fac.rooms + '</span>';
        meta.appendChild(row2);
      }

      document.getElementById('hd-anfragen-btn').addEventListener('click', function () {
        hdAnfragen(h.name || '');
      });
    }

    // ── Crisp Anfrage ──────────────────────────────────────────────
    function hdAnfragen(hotelName, roomName) {
      var msg = roomName
        ? 'Ich interessiere mich für ' + hotelName + ' (' + roomName + ') – bitte senden Sie mir ein Angebot.'
        : 'Ich interessiere mich für ' + hotelName + ' – bitte senden Sie mir ein Angebot.';
      if (window.$crisp) {
        try { $crisp.push(['set', 'session:data', [[['Hotel', hotelName], ['Zimmer', roomName || '']]]]); } catch (e) {}
        try { $crisp.push(['do', 'chat:open']); } catch (e) {}
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(msg).catch(function () {});
      }
      showAnfragenBubble(hotelName, msg);
    }

    function showAnfragenBubble(hotelName, msg) {
      var el = document.getElementById('hd-ab');
      if (!el) {
        el = document.createElement('div');
        el.id = 'hd-ab'; el.className = 'hd-ab';
        document.body.appendChild(el);
      }
      el.innerHTML =
        '<div class="hd-ab-head">' +
          '<span>✅ Anfrage bereit</span>' +
          '<button class="hd-ab-x" onclick="document.getElementById(\'hd-ab\').style.display=\'none\'">×</button>' +
        '</div>' +
        '<div class="hd-ab-hotel">🏨 <strong>' + esc(hotelName) + '</strong></div>' +
        '<div class="hd-ab-msg">' + esc(msg) + '</div>' +
        '<div class="hd-ab-hint">📋 Kopiert — im Chat <kbd>Ctrl+V</kbd> einfügen &amp; Enter drücken</div>';
      el.style.display = 'block';
      clearTimeout(el._t);
      el._t = setTimeout(function () { el.style.display = 'none'; }, 12000);
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Haupt-Render ─────────────────────────────────────────────────
    function renderHotel(h) {
      var params = new URLSearchParams(location.search);
      var displayName = h.name || (params.get('slug') || '').replace(/-/g, ' ') || 'Hotel';
      document.getElementById('page-title').textContent = displayName + ' – Details & Anfrage | JetztBuchbar';
      var loc = [h.city, h.country].filter(Boolean).join(', ');
      var descText = displayName + (loc ? ' in ' + loc : '') + ' – Ausstattung, Zimmer, Fotos und Angebot auf JetztBuchbar.';
      document.getElementById('page-desc').setAttribute('content', descText);
      var canonicalEl = document.getElementById('page-canonical');
      if (canonicalEl) canonicalEl.setAttribute('href', 'https://www.jetztbuchbar.de/hotel.html?id=' + encodeURIComponent(h.giataId || hotelId));

      // JSON-LD
      var schema = {
        '@context': 'https://schema.org', '@type': 'LodgingBusiness',
        'name': displayName, 'description': descText,
        'url': 'https://www.jetztbuchbar.de/hotel.html?id=' + encodeURIComponent(h.giataId || hotelId),
        'address': { '@type': 'PostalAddress', 'addressLocality': h.city || '', 'addressCountry': h.country || '' }
      };
      if (h.stars) schema['starRating'] = { '@type': 'Rating', 'ratingValue': String(h.stars), 'bestRating': '5' };
      if (h.lat && h.lng) schema['geo'] = { '@type': 'GeoCoordinates', 'latitude': h.lat, 'longitude': h.lng };
      if (h.images && h.images[0]) schema['image'] = h.images[0];
      var ldEl = document.createElement('script');
      ldEl.type = 'application/ld+json'; ldEl.textContent = JSON.stringify(schema);
      document.head.appendChild(ldEl);

      // Galerie
      var imgs = (h.allImages && h.allImages.length) ? h.allImages : (h.images || []);
      if (imgs.length) buildGallery(imgs, displayName);
      else document.getElementById('hd-gallery').style.display = 'none';

      // Hotel-Kopf (main)
      document.getElementById('hd-name').textContent = h.name || '';
      document.getElementById('hd-stars').textContent = h.stars ? '★'.repeat(h.stars) + '☆'.repeat(Math.max(0, 5 - h.stars)) : '';
      document.getElementById('hd-location').textContent = loc ? '📍 ' + loc : '';

      // Sidebar
      buildSidebar(h);

      // Karte
      var leafletMap = null;
      if (h.lat && h.lng) leafletMap = buildMap(h.lat, h.lng, h.name);

      // Ausstattung (factIds + facilities fallback)
      if (h.factIds && h.factIds.length) {
        buildFacilities(h.factIds, h.facilities || {});
      } else if (h.facilities) {
        // Fallback: binary facilities
        buildFacilities([], h.facilities);
      }

      // Beschreibung
      var secs = (h.allSections && h.allSections.length) ? h.allSections : (h.description || []);
      buildDesc(secs);

      // Zimmertypen
      buildRooms(h.rooms || [], h.name || '');

      // Anzeigen
      document.getElementById('hd-loading').style.display = 'none';
      document.getElementById('hd-root').style.display = '';

      if (leafletMap) requestAnimationFrame(function () { leafletMap.invalidateSize(); });
    }

    // ── Start ────────────────────────────────────────────────────────
    var hotelId = new URLSearchParams(location.search).get('id');
    if (!hotelId) {
      document.getElementById('hd-loading').textContent = '❌ Kein Hotel ausgewählt. Bitte zurück zur Übersicht.';
    } else {
      fetch('/api/giata?action=detail&id=' + encodeURIComponent(hotelId))
        .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(function (h) { if (h.error) throw new Error(h.error); renderHotel(h); })
        .catch(function (err) {
          document.getElementById('hd-loading').textContent = '❌ Hotel konnte nicht geladen werden. (' + err.message + ')';
        });
    }

  })();
  </script>
